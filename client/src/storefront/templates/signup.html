<!DOCTYPE html>
<html class="no-js" lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – Cheezka Street Food</title>
    <link rel='stylesheet' href='css/style.css' media='all' />
    <link rel='stylesheet' href='css/bootstrap.css' media='all' />
    <link rel='stylesheet' href='css/main.css' media='all' />
    <link rel='stylesheet' href='css/extracted-inline.css' media='all' />
<link rel='stylesheet' href='wp-content/themes/cheezka/assets/css/fontawesome4d80.css' media='all' />
    <link rel='stylesheet' href='http://fonts.googleapis.com/css?family=Lato|Nunito+Sans:300,400,700,800,900&subset=latin,latin-ext' media='all' />
    <link rel="icon" href="wp-content/uploads/2020/11/favicon.ico" />
    <link rel='stylesheet' href='css/signup-inline.css' media='all' />
</head>

<body class="auth-page">


<div class="top-fixed">
  <div class="container navp0">
    <div class="row overflows smallscreen-wrapper align-items-center">
      <div class="col pt-1 pb-1">
        <nav class="navbar pl-0 pr-0 navbar-expand-lg minicartfix">
          <a class="navbar-brand" href='index.html' title='cheezka' rel='home'>
            <img src='assets/images/2020/12/Logo_light.svg' alt='cheezka'>
          </a>
          <button class="navbar-toggler first-button pt-1" type="button" data-toggle="collapse"
            data-target="#main_nav" aria-controls="main_nav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="animated-icon1"><span></span><span></span><span></span></span>
          </button>
          <div class="justify-content-end custom-mega-menu custom-mega-menub collapse navbar-collapse" id="main_nav">
            <ul id="menu-menu-1" class="navbar-nav">
              <li class="menu-item"><a href="index.html">HOME</a></li>
              <li class="menu-item"><a href="shop.html">SHOP</a></li>
              <li class="menu-item"><a href="about.html">ABOUT</a></li>
              <li class="menu-item"><a href="contact.html">CONTACT</a></li>
              <li class="menu-item ck-ml-8"><a href="contact.html" class="ck-nav-cta"><i class="fa fa-envelope ck-mr-6"></i>CONTACT US</a></li>
              <li class="menu-item ck-ml-8"><a href="login.html" class="ck-nav-cta"><i class="fa fa-sign-in-alt ck-mr-6"></i>LOGIN</a></li>
            </ul>
          </div>
        </nav>
      </div>
    </div>
  </div>
</div>

<main>


<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <img src='assets/images/2020/12/Logo_light1.svg' alt='cheezka' class="auth-logo">
      <h1>Join Cheezka!</h1>
      <p>Create your account in seconds</p>
    </div>

    <form id="signup-form" method="post" action="#">
      <div class="form-group">
        <label for="signup-name">Full Name</label>
        <input type="text" id="signup-name" name="name" placeholder="Your full name" required>
      </div>

      <div class="form-group">
        <label for="signup-email">Email Address</label>
        <input type="email" id="signup-email" name="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" name="password" placeholder="••••••••" required>
      </div>

      <div class="form-group">
        <label for="signup-confirm">Confirm Password</label>
        <input type="password" id="signup-confirm" name="confirm" placeholder="••••••••" required>
      </div>

      <div class="terms-check">
        <label>
          <input type="checkbox" id="terms-agree" name="terms" required>
          <span>I agree to the <a href="#">Terms &amp; Conditions</a> and <a href="#">Privacy Policy</a></span>
        </label>
      </div>

      <div id="form-status">
      </div>

      <button type="submit" class="submit-btn">Create Account</button>
    </form>

    <div class="login-link">
      Already have an account? <a href="login.html">Login here</a>
    </div>

    <div class="home-link">
      <a href="index.html"><i class="fa fa-chevron-left ck-mr-5"></i> Back to Home</a>
    </div>
  </div>
</div>

</main>

<script src="js/jquery.min.js"></script>
<script src="js/bootstrap.js"></script>
<script src="js/script.js"></script>
<script src="js/prevent-refresh.js"></script>
<script src="js/navbar-profile.js"></script>

<script>
// Signup Form Handler
document.getElementById('signup-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const name = document.getElementById('signup-name').value;
  const email = document.getElementById('signup-email').value;
  const password = document.getElementById('signup-password').value;
  const confirmPassword = document.getElementById('signup-confirm').value;
  const termsAgreed = document.getElementById('terms-agree').checked;
  const statusDiv = document.getElementById('form-status');
  
  try {
    // Validate inputs
    if (!name || !email || !password || !confirmPassword) {
      showError(statusDiv, 'Please fill in all fields');
      return;
    }
    
    if (password.length < 6) {
      showError(statusDiv, 'Password must be at least 6 characters');
      return;
    }
    
    if (password !== confirmPassword) {
      showError(statusDiv, 'Passwords do not match');
      return;
    }
    
    if (!termsAgreed) {
      showError(statusDiv, 'You must agree to the terms and conditions');
      return;
    }
    
    // Validate email format
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      showError(statusDiv, 'Please enter a valid email address');
      return;
    }
    
    // Show loading state
    statusDiv.style.display = 'block';
    statusDiv.style.backgroundColor = '#e3f2fd';
    statusDiv.style.color = '#0C4C7B';
    statusDiv.textContent = 'Creating account...';
    
    // Simulate API call (in production, uncomment and use your backend endpoint)
    // const response = await fetch('http://localhost:8000/api/auth/signup', {
    //   method: 'POST',
    //   headers: { 'Content-Type': 'application/json' },
    //   body: JSON.stringify({ name, email, password })
    // });
    
    // For now, simulate successful signup after 1.5 seconds
    await new Promise(resolve => setTimeout(resolve, 1500));
    
    // Store new user data in localStorage
    const userData = {
      name: name,
      email: email,
      signupTime: new Date().toISOString()
    };
    
    localStorage.setItem('cheezka_user', JSON.stringify(userData));
    
    // Show success
    statusDiv.style.backgroundColor = '#c8e6c9';
    statusDiv.style.color = '#1B2A49';
    statusDiv.textContent = 'Account created successfully! Redirecting...';
    
    // Redirect after 2 seconds
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 2000);
    
  } catch (error) {
    console.error('Signup error:', error);
    showError(statusDiv, 'An error occurred. Please try again.');
  }
});

function showError(element, message) {
  element.style.display = 'block';
  element.style.backgroundColor = '#ffcdd2';
  element.style.color = '#c62828';
  element.textContent = message;
}

// Check if user is already logged in
window.addEventListener('load', function() {
  const user = localStorage.getItem('cheezka_user');
  if (user) {
    document.getElementById('form-status').style.display = 'block';
    document.getElementById('form-status').style.backgroundColor = '#fff3e0';
    document.getElementById('form-status').style.color = '#e65100';
    document.getElementById('form-status').textContent = 'Already logged in. Redirecting to home...';
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 2000);
  }
});
</script>
</body>
</html>
